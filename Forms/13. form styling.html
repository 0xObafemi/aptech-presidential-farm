<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Styling</title>
    <style>
        form {
            border-radius: 5px;
            background-color: #73769b;
            padding: 25px;
        }

        input,
        button,
        label {
            display: block;
        }

        input,
        select {
            width: 100%;
            font-size: 16px;
            padding: 8px 0;
            margin: 6px 0;
            border-radius: 6px;
            border: none;
            box-shadow: #71b3e9 2px 2px 3px;
            color: rgb(15, 27, 15);
            font-weight: bold;
        }

        input:focus,
        
        select:focus {
            outline: none;
            box-shadow: #71b3e9 2px 2px 3px;
        }

        button {
            background-color: #397c3c;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }

        input[type=text],
        input[type=email]{
            width: 100%;
            font-size: 16px;
            padding: 8px;
            margin: 6px 0;
            border-radius: 6px;
            border: none;
            box-shadow: 2px 2px 3px black;
        }

        input[type=search]{
            width: 130px;
            text-align: left;
            border-radius: 6px;
            margin: 6px 0;
            border: none;
            padding: 8px;
            transition: width 0.4s ease-in-out;
        }

        input[type=search]:focus {
            width: 100%;
        }
    </style>
</head>

<body>
    <form action="">
        <label for="">Name</label>
        <input type="text" name="" placeholder="Enter your full name" />
        <label for="">Email</label>
        <input type="email" name="" placeholder="Enter your email address" />
        <select name="" id="">
            <option value="">Abuja</option>
            <option value="">Lagos</option>
            <option value="">Ogun</option>
            <option value="">Nassarawa</option>
            <option value=""> Rivers</option>
        </select>

        <input type="search" placeholder="Search" />
        <button type="submit">Book</button>
    </form>
</body>

</html>
